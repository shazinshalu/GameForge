{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GameForge Feedback</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
    body {
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(-45deg, #020617, #0f172a, #020617, #111827);
        background-size: 400% 400%;
        animation: bgMove 10s ease infinite;
    }

    @keyframes bgMove {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    .gaming-font {
        font-family: 'Orbitron', sans-serif;
    }
</style>

</head>

<body class="min-h-screen text-white">

<!-- 🔥 NAVBAR -->
<div class="bg-black/60 backdrop-blur-lg border-b border-gray-700 px-6 py-4 flex justify-between items-center">

    <!-- Logo -->
    <div class="flex items-center gap-3">
        <img src="\static\img\gameforge-logo.PNG" class="h-10">
        <span class="gaming-font text-xl text-cyan-400">GameForge</span>
    </div>

    <!-- Links -->
    <div class="flex gap-6 text-sm">
        <a href="{% url 'index' %}" class="hover:text-cyan-400">Home</a>
        <a href="{% url 'about' %}" class="hover:text-cyan-400">About</a>
        <a href="{% url 'profile' %}" class="hover:text-cyan-400">Profile</a>
    </div>

</div>

<!-- 🔥 MAIN SECTION -->
<div class="flex items-center justify-center mt-16 px-4">

<div class="backdrop-blur-xl bg-white/5 border border-gray-700 shadow-2xl rounded-3xl p-10 w-full max-w-lg">

    <!-- Title -->
    <h2 class="text-3xl font-semibold text-center mb-6 gaming-font 
               bg-gradient-to-r from-cyan-400 to-purple-500 bg-clip-text text-transparent">
        Share Your Experience 🎮
    </h2>

    <!-- Form -->
    <form method="POST" class="space-y-6">
        {% csrf_token %}

        <!-- Email -->
        <div>
            <label class="block text-sm mb-1 text-gray-400">Email</label>
            <input type="email" name="email" value="{{ e.email }}" readonly
                class="w-full px-4 py-2 rounded-xl bg-black/40 text-white border border-gray-600 focus:outline-none">
        </div>

        <!-- Feedback -->
        <div>
            <label class="block text-sm mb-1 text-gray-400">Feedback</label>
            <textarea name="feedback_text" rows="4" placeholder="Write your feedback..."
                class="w-full px-4 py-3 rounded-xl bg-black/40 text-white border border-gray-600 
                       focus:outline-none focus:ring-2 focus:ring-cyan-400 transition"></textarea>
        </div>

        <!-- Rating -->
        <div>
            <label class="block text-sm mb-3 text-gray-400">Rating</label>

            <div class="flex justify-between text-center">
                {% for i in "12345" %}
                <label class="cursor-pointer group">
                    <input type="radio" name="rating" value="{{ i }}" class="hidden peer">

                    <div class="flex flex-col items-center">
                        <span class="text-3xl text-gray-500 
                                     peer-checked:text-yellow-400 
                                     group-hover:scale-125 
                                     group-hover:text-yellow-300 
                                     transition duration-200">
                            ★
                        </span>
                        <span class="text-xs mt-1 text-gray-400">{{ i }}</span>
                    </div>
                </label>
                {% endfor %}
            </div>
        </div>

        <!-- Submit -->
        <button type="submit"
            class="w-full py-3 rounded-xl font-semibold 
                   bg-gradient-to-r from-cyan-400 to-purple-500 text-black 
                   hover:scale-105 hover:shadow-lg hover:shadow-cyan-400/40 transition duration-300">
            Submit Feedback 🚀
        </button>

    </form>

</div>

</div>

</body>
</html>
