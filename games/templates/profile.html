<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gamforge Profile</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #0f172a, #020617);
}
.logo-font {
    font-family: 'Orbitron', sans-serif;
}
</style>

</head>

<body class="min-h-screen flex items-center justify-center text-white">

<div class="w-full max-w-md">

    <!-- Glass Card -->
    <div class="bg-white/5 backdrop-blur-xl border border-white/10 rounded-3xl shadow-2xl p-6">

        <!-- LOGO -->
        <div class="text-center mb-5">
            <h1 class="logo-font text-2xl font-bold bg-gradient-to-r from-cyan-400 to-indigo-500 bg-clip-text text-transparent">
                GAMFORGE ⚡
            </h1>
        </div>

        <!-- PROFILE VIEW -->
        <div id="profileView">

            <!-- Avatar -->
            <div class="flex flex-col items-center">

                <div class="relative">
                    <div class="w-28 h-28 rounded-full bg-gradient-to-r from-cyan-500 to-indigo-600 p-[3px]">
                        <div class="w-full h-full bg-black rounded-full flex items-center justify-center text-3xl font-bold">
                            {{ user.name|slice:":1" }}
                        </div>
                    </div>

                    <!-- Glow -->
                    <div class="absolute inset-0 rounded-full blur-xl bg-cyan-500/30"></div>
                </div>

                <h2 class="mt-4 text-xl font-semibold">
                    {{ user.name }}
                </h2>

                <p class="text-gray-400 text-sm">
                    {{ user.email }}
                </p>

            </div>

            <!-- Info -->
            <div class="mt-6 space-y-3 text-sm">

                <div class="flex justify-between bg-white/5 p-3 rounded-xl border border-white/10">
                    <span>📞 Phone</span>
                    <span>{{ user.phone }}</span>
                </div>

                <div class="flex justify-between bg-white/5 p-3 rounded-xl border border-white/10">
                    <span>📍 Location</span>
                    <span>{{ user.address }}</span>
                </div>

            </div>

            <!-- Buttons -->
            <div class="mt-6 flex gap-3">

                <a href="{% url 'index' %}" 
                   class="w-1/3 text-center bg-white/10 py-2 rounded-xl hover:bg-white/20 transition">
                   Home
                </a>

                <button onclick="toggleEdit()" 
                    class="w-1/3 bg-gradient-to-r from-cyan-500 to-indigo-600 py-2 rounded-xl hover:scale-105 transition shadow-lg">
                    Edit
                </button>

                <form method="POST" action="{% url 'logout' %}" class="w-1/3">
                    {% csrf_token %}
                    <button type="submit"
                        class="w-full bg-red-500/80 py-2 rounded-xl hover:bg-red-600 transition">
                        Logout
                    </button>
                </form>

            </div>

        </div>

        <!-- EDIT FORM -->
        <div id="editForm" class="hidden">

            <h2 class="text-lg font-semibold text-center mb-4">
                Edit Profile
            </h2>

            <form method="POST" action="/editprofile/" class="space-y-3">
                {% csrf_token %}

                <input type="text" name="name" value="{{ user.name }}" 
                    class="w-full p-3 bg-white/5 border border-white/10 rounded-xl focus:ring-2 focus:ring-cyan-400 outline-none"
                    placeholder="Full Name">

                <input type="text" name="phone" value="{{ user.phone }}" 
                    class="w-full p-3 bg-white/5 border border-white/10 rounded-xl focus:ring-2 focus:ring-cyan-400 outline-none"
                    placeholder="Phone">

                <input type="text" name="location" value="{{ user.address }}" 
                    class="w-full p-3 bg-white/5 border border-white/10 rounded-xl focus:ring-2 focus:ring-cyan-400 outline-none"
                    placeholder="Location">

                <div class="flex gap-3">
                    <button type="submit" 
                        class="w-1/2 bg-gradient-to-r from-cyan-500 to-indigo-600 py-2 rounded-xl hover:scale-105 transition">
                        Save
                    </button>

                    <button type="button" onclick="toggleEdit()" 
                        class="w-1/2 bg-white/10 py-2 rounded-xl hover:bg-white/20 transition">
                        Cancel
                    </button>
                </div>

            </form>

        </div>

    </div>

</div>

<script>
function toggleEdit() {
    document.getElementById('profileView').classList.toggle('hidden');
    document.getElementById('editForm').classList.toggle('hidden');
}
</script>

</body>
</html>
