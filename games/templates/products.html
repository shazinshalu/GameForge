<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Product</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-gray-100 to-blue-100 min-h-screen flex items-center justify-center">

    <div class="bg-white shadow-2xl rounded-3xl w-full max-w-3xl p-8">

        <!-- Header -->
        <div class="flex items-center justify-between mb-6">
            <h2 class="text-3xl font-bold text-gray-800">🛍️ Add Product</h2>
            <span class="text-sm text-gray-500">Admin Panel</span>
        </div>

        <!-- Messages -->
        {% if messages %}
            {% for message in messages %}
                <div class="mb-4 p-3 rounded-lg bg-red-100 text-red-600 shadow">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST" enctype="multipart/form-data" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            {% csrf_token %}

            <!-- Name -->
            <div>
                <label class="block text-sm font-semibold mb-1">Product Name</label>
                <input type="text" name="name" required
                       class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-blue-400 focus:outline-none">
            </div>

            <!-- Price -->
            <div>
                <label class="block text-sm font-semibold mb-1">Price</label>
                <input type="number" step="0.01" name="price" required
                       class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-blue-400 focus:outline-none">
            </div>

            <!-- Quantity -->
            <div>
                <label class="block text-sm font-semibold mb-1">Quantity</label>
                <input type="number" name="quantity" required
                       class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-blue-400 focus:outline-none">
            </div>

            <!-- Category -->
            <div>
                <label class="block text-sm font-semibold mb-1">Category</label>
                <input type="text" name="category" required
                       class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-blue-400 focus:outline-none">
            </div>

            <!-- Description (full width) -->
            <div class="md:col-span-2">
                <label class="block text-sm font-semibold mb-1">Description</label>
                <textarea name="description" rows="3" required
                          class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-blue-400 focus:outline-none"></textarea>
            </div>

            <!-- Image Upload -->
            <div class="md:col-span-2">
                <label class="block text-sm font-semibold mb-2">Product Image</label>

                <div class="border-2 border-dashed border-gray-300 rounded-xl p-4 text-center hover:border-blue-400 transition">
                    <input type="file" name="image" id="imageInput" class="hidden" required>
                    
                    <label for="imageInput" class="cursor-pointer text-gray-500">
                        📷 Click to upload image
                    </label>

                    <!-- Preview -->
                    <img id="preview" class="mt-4 mx-auto hidden h-40 rounded-xl shadow">
                </div>
            </div>

            <!-- Submit -->
            <div class="md:col-span-2">
                <button type="submit"
                        class="w-full bg-gradient-to-r from-blue-500 to-blue-700 text-white py-3 rounded-xl text-lg font-semibold hover:scale-105 transform transition">
                    ➕ Add Product
                </button>
            </div>

        </form>
    </div>

    <!-- Image Preview Script -->
    <script>
        const input = document.getElementById('imageInput');
        const preview = document.getElementById('preview');

        input.addEventListener('change', function () {
            const file = this.files[0];
            if (file) {
                preview.src = URL.createObjectURL(file);
                preview.classList.remove('hidden');
            }
        });
    </script>

</body>
</html>
